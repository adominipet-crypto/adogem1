name: 過去10年分CSV一括ダウンロード

# 手動で実行するための設定
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests google-api-python-client google-auth-httplib2 google-auth-oauthlib yfinance

    - name: Run download script
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      run: python download_10y_csv.py
