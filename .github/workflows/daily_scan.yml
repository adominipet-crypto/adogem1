Name: adoGEM Full Scan Continuous

on:
  schedule:
    # 祝日を除く月〜金、日本時間20:00（UTC 11:00）に自動起動
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # 手動実行ボタン（ここからいつでも手動起動できます）

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v3 から v4 にアップデート

      - name: Set up Python
        uses: actions/setup-python@v5 # 👈 actions/tools/python から修正
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas gspread google-auth lxml html5lib requests

      - name: Run Full Scan & Error Watch
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          # 🌟 引数を「1300 10001」にして、全市場を1本の流れで連続スキャンさせます
          python adogem1.py 1300 10001
