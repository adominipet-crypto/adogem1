      - name: Run Split Scan
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          # 実行されたスケジュール（cron）の内容で範囲を分ける
          # 09:00(UTC) = 日本18:00
          # 12:00(UTC) = 日本21:00
          # 15:00(UTC) = 日本00:00
          
          if [[ "${{ github.event.schedule }}" == "0 9 * * *" ]]; then
            python adogem1.py 1300 4000
          elif [[ "${{ github.event.schedule }}" == "0 12 * * *" ]]; then
            python adogem1.py 4001 7000
          else
            # 手動実行(workflow_dispatch)や深夜便はここを担当
            python adogem1.py 7001 10000
          fi
