name: adoGEM Full Scan Continuous

on:
  schedule:
    # 🌟 日本時間の毎週火曜日〜土曜日の「午前 4:40」（UTC 前日19:40）に起動
    # （月〜金の相場結果を、翌朝5時に判定するため、火〜土の朝に動かします）
    - cron: '40 19 * * 2-6'
  workflow_dispatch: # 手動実行ボタン

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas gspread google-auth lxml html5lib requests

      - name: Run Full Scan & Error Watch
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        run: |
          python adogem1.py 1300 10001
