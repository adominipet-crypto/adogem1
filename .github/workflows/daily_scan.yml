name: adoGEM Triple Scan

on:
  schedule:
    - cron: '0 9 * * *'  # 1便：日本18:00
    - cron: '0 12 * * *' # 2便：日本21:00
    - cron: '0 15 * * *' # 3便：日本00:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas_datareader yfinance
      - name: Run Split Scan
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          if [[ "$SCHEDULE" == "0 9 * * *" ]]; then
            python adogem1.py 1300 4000
          elif [[ "$SCHEDULE" == "0 12 * * *" ]]; then
            python adogem1.py 4001 7000
          else
            python adogem1.py 7001 10000
          fi
