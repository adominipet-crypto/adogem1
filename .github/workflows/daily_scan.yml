name: Stock Analysis Automator

on:
  schedule:
    # 日本時間の火・水・木・金・土の朝 4:40 に実行 (UTC：月〜金の19:40)
    - cron: '40 19 * * 1-5'
  workflow_dispatch: # 手動 実行ボタンを残します

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas gspread google-auth google-auth-oauthlib requests yfinance openpyxl

      - name: Run Analysis Script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python adogem1.py
