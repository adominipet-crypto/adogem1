name: adoGEM Full Scan Continuous

on:
  push:
  schedule:
    - cron: '40 19 * * 2-6'
  workflow_dispatch:  # これがあることで手動実行ボタンが出ます

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: pip install pandas gspread google-auth requests yfinance openpyxl
      - name: Run script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python adogem1.py 4000 4500
