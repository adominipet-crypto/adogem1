name: adoGEM Full Scan Continuous

on:
  schedule:
    # 日本時間 毎週月〜金の 5:52 PM (UTC 月〜金の 08:52)
    - cron: '52 08 * * 1-5'
  workflow_dispatch: # 手動実行ボタン

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # API取得とスプレッドシート更新に必要なライブラリ
          pip install pandas gspread google-auth requests tqdm

      - name: Run Full Scan
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          # 1300番から10001番までスキャン開始
          python adogem1.py 1300 10001
