name: adoGEM Triple Scan

on:
  schedule:
    # 📆 日本時間の火曜日〜金曜日の 夜20:00 (世界標準時 11:00)
    - cron: '0 11 * * 2-5'
    # 📆 日本時間の土曜日の 夜20:00 (世界標準時 11:00) ※金曜日の相場確定分
    - cron: '0 11 * * 6'
  workflow_dispatch: # 🛠️ いつでも手動で即時実行できるボタンを残す

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pandas_datareader yfinance gspread google-auth openpyxl html5lib lxml requests

    - name: Run Scan Script
      env:
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        python adogem1.py 1300 4000
